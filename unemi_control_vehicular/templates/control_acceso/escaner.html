<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garita UNEMI - Escáner</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; text-align: center; padding: 20px; }
        .scanner-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        h2 { color: #004b87; }
        input[type="text"] { width: 90%; padding: 10px; margin-bottom: 20px; font-size: 16px; border: 2px solid #ccc; border-radius: 5px; text-align: center; }
        input[type="text"]:focus { border-color: #004b87; outline: none; }
        select { padding: 10px; font-size: 16px; margin-bottom: 20px; width: 50%; }
        .btn { padding: 12px 20px; background-color: #004b87; color: white; border: none; cursor: pointer; border-radius: 5px; font-size: 16px; width: 100%; font-weight: bold;}
        .btn:hover { background-color: #003366; }
        .alert { padding: 15px; margin-bottom: 20px; border-radius: 5px; font-weight: bold; font-size: 18px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <div class="scanner-box">
        <h2>Punto de Control Vehicular</h2>
        <p>Simulador de Escáner QR</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert {% if message.tags %}{{ message.tags }}{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <label for="tipo_movimiento"><strong>Tipo de Movimiento:</strong></label><br>
            <select name="tipo_movimiento" id="tipo_movimiento">
                <option value="Ingreso">Entrada al Campus</option>
                <option value="Salida">Salida del Campus</option>
            </select><br>

            <input type="text" name="contenido_qr" placeholder="Esperando lectura del QR..." required autofocus autocomplete="off">
            
            <button type="submit" class="btn">Procesar Lectura</button>
        </form>
    </div>

</body>
</html>
